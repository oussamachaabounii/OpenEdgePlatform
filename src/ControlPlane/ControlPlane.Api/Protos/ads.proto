// Minimal subset of envoy.service.discovery.v3 used by the control plane.
//
// Field numbers and the service/package name mirror the upstream Envoy proto definitions
// so a real Envoy client can complete the connection handshake. The resources sent inside
// DiscoveryResponse.resources are encoded as JSON inside google.protobuf.Any with a custom
// type URL — production-grade interop with Envoy requires the full envoy proto bundle, which
// this learning repository intentionally avoids vendoring.

syntax = "proto3";

package envoy.service.discovery.v3;

option csharp_namespace = "OpenEdgePlatform.ControlPlane.Api.Grpc";

import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";

service AggregatedDiscoveryService {
  rpc StreamAggregatedResources(stream DiscoveryRequest) returns (stream DiscoveryResponse);
}

message Node {
  string id = 1;
  string cluster = 2;
  google.protobuf.Struct metadata = 3;
  Locality locality = 4;
  string user_agent_name = 6;
  string user_agent_version = 7;
}

message Locality {
  string region = 1;
  string zone = 2;
  string sub_zone = 3;
}

message DiscoveryRequest {
  string version_info = 1;
  Node node = 2;
  repeated string resource_names = 3;
  string type_url = 4;
  string response_nonce = 5;
  Status error_detail = 6;
}

message DiscoveryResponse {
  string version_info = 1;
  repeated google.protobuf.Any resources = 2;
  bool canary = 3;
  string type_url = 4;
  string nonce = 5;
}

message Status {
  int32 code = 1;
  string message = 2;
}
